apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: genai

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: chatbot-frontend:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 80

          env:
            - name: VITE_API_URL
              value: "http://backend:8000"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: genai

spec:
  type: NodePort

  selector:
    app: frontend

  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
